document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\")}\n  .hero .crosshair{position:absolute;color:var(--gold);opacity:.45;font-family:var(--mono);font-size:10px;letter-spacing:.2em}\n  .hero .crosshair.tl{top:118px;left:44px}\n  .hero .crosshair.tr{top:118px;right:44px;text-align:right}\n  .hero .crosshair.bl{bottom:36px;left:44px}\n  .hero .crosshair.br{bottom:36px;right:44px;text-align:right}\n  .hero .crosshair .k{color:var(--ink-mute)}\n  .hero-inner{position:relative;z-index:5;text-align:center;padding:0 32px}\n  .hero .eyebrow{display:inline-flex;align-items:center;gap:14px;margin-bottom:36px;font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim)}\n  .hero .eyebrow .hair{width:40px;height:1px;background:var(--gold)}\n  .hero .eyebrow b{color:var(--gold);font-weight:500}\n  .hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(96px,16vw,260px);line-height:.88;letter-spacing:-.02em;position:relative}\n  .hero h1 .dot{color:var(--gold)}\n  .hero h1 .outline{-webkit-text-stroke:1px rgba(201,168,76,.55);color:transparent;font-style:italic;font-weight:300}\n  .hero .subline{margin-top:28px;font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink-dim);font-weight:300}\n  .hero .meta{margin-top:48px;display:flex;justify-content:center;align-items:center;gap:28px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--ink-mute);text-transform:uppercase}\n  .hero .meta .dot-sep{width:3px;height:3px;background:var(--gold);border-radius:50%}\n  .hero .actions{margin-top:52px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}\n  .btn{display:inline-flex;align-items:center;gap:12px;padding:16px 28px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;transition:.3s;cursor:pointer;border:none;font-family:var(--sans)}\n  .btn-primary{background:var(--gold);color:#0D1117;font-weight:500}\n  .btn-primary:hover{background: block .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--gold);margin-bottom:36px;text-transform:uppercase;display:flex;justify-content:center;align-items:center;gap:18px}\n  .cta-block .kicker .hair{width:40px;height:1px;background:var(--gold)}\n  .cta-block h2{font-family:var(--serif);font-size:clamp(60px,9vw,140px);font-weight:400;line-height:.95;letter-spacing:-.01em;max-width:1100px;margin:0 auto}\n  .cta-block h2 em{font-style:italic;color:var(--gold);font-weight:300}\n  .cta-block .sub{margin-top:28px;font-size:15px;color:var(--ink-dim);line-height:1.7;max-width:540px;margin-left:auto;margin-right:auto;font-family:var(--serif);font-style:italic}\n  .cta-form{margin-top:56px;display:flex;justify-content:center;gap:0;max-width:560px;margin-left:auto;margin-right:auto;border:1px solid var(--line);background:var(--bg-card-2)}\n  .cta-form input{flex:1;background:transparent;border:none;color:var(--ink);font-family:var(--sans);font-size:13px;padding:18px 22px;outline:none;letter-spacing:.04em}\n  .cta-form input::placeholder{color:var(--ink-mute)}\n  .cta-form button{background:var(--gold);color:#0D1117;border:none;padding:0 28px;font-family:var(--sans);font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:.25s}\n  .cta-form button:hover{background:var(--gold-hi)}\n  .cta-contact{margin-top:56px;display:flex;justify-content:center;gap:64px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.18em;text-transform:uppercase}\n  .cta-contact div b{color:var(--gold);font-weight:500;display:block;margin-bottom:6px;font-size:9.5px}\n\n  /* -------- ABOUT -------- */\n  .about{padding-top:120px;padding-bottom:120px}\n  .about-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:center}\n  .about-copy .idx{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.24em;margin-bottom:22px;text-transform:uppercase}\n  .about-copy h2{font-family:var(--serif);font-size:clamp(44px,5.4vw,78px);font-weight:400;line-height:1;letter-spacing:-.015em;margin-bottom:28px}\n  .about-copy h2 em{font-style:italic;color:var(--gold);font-weight:300}\n  .about-copy p{color:var(--ink-dim);font-size:16px;line-height:1.75;max-width:520px;font-family:var(--serif)}\n  .about-stats{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line)}\n  .about-stat{background:var(--bg-card-2);padding:34px 36px;display:flex;align-items:baseline;justify-content:space-between;gap:24px;transition:background .3s}\n  .about-stat:hover{background:var(--bg-card)}\n  .about-stat .n{font-family:var(--serif);font-size:72px;color:var(--gold);font-weight:400;letter-spacing:-.02em;line-height:1}\n  .about-stat .l{font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:.22em;text-transform:uppercase;text-align:right}\n\n  /* -------- FOOTER -------- */\n  footer{border-top:1px solid var(--line-soft);padding:56px 44px 36px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;background:var(--bg-deep)}\n  footer .brand-f img{width:44px;filter:brightness(0) saturate(100%) invert(72%) sepia(39%) saturate(540%) hue-rotate(10deg) brightness(95%) contrast(88%);margin-bottom:18px}\n  footer .brand-f .w{font-family:var(--serif);font-size:22px;letter-spacing:.14em;margin-bottom:10px}\n  footer .brand-f .w .dot{color:var(--gold)}\n  footer .brand-f p{color:var(--ink-dim);font-size:13px;line-height:1.7;max-width:300px;font-style:italic;font-family:var(--serif)}\n  footer .col h4{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.24em;text-transform:uppercase;margin-bottom:18px}\n  footer .col ul{list-style:none;display:flex;flex-direction:column;gap:10px}\n  footer .col a{font-size:13px;color:var(--ink-dim);transition:color .25s}\n  footer .col a:hover{color:var(--gold)}\n  .copyr{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding-top:28px;margin-top:24px;border-top:1px solid var(--line-soft);font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:.2em;text-transform:uppercase;flex-wrap:wrap;gap:18px}\n\n  /* ---- tweaks ---- */\n  .tweaks{position:fixed;right:18px;bottom:18px;z-index:200;background:rgba(10,13,18,.96);border:1px solid var(--gold-lo);padding:16px 16px 14px;font-family:var(--mono);font-size:10px;color:var(--ink);width:220px;display:none;backdrop-filter:blur(12px);letter-spacing:.06em}\n  .tweaks.on{display:block}\n  .tweaks h5{font-family:var(--mono);color:var(--gold);letter-spacing:.24em;font-size:9.5px;margin-bottom:12px;text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--line);padding-bottom:8px}\n  .tweaks label{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;color:var(--ink-dim);font-size:10px;letter-spacing:.08em}\n  .tweaks input[type=range]{width:100px;accent-color:var(--gold)}\n  .tweaks input[type=color]{width:28px;height:20px;background:transparent;border:1px solid var(--line);cursor:pointer}\n  .tweaks select{background:var(--bg);color:var(--ink);border:1px solid var(--line);padding:3px 6px;font-family:var(--mono);font-size:10px}\n\n  @media (max-width:1100px){\n    .cocktails{grid-template-columns:repeat(2,1fr)}\n    .packages{grid-template-columns:1fr}\n    .addon-grid{grid-template-columns:repeat(2,1fr)}\n    .strip{grid-template-columns:repeat(2,1fr)}\n    footer{grid-template-columns:1fr 1fr}\n    .nav ul{display:none}\n    .nav{padding:14px 20px}\n    section.block{padding:100px 20px}\n    .section-head{flex-direction:column;align-items:flex-start}\n    .section-head .right{text-align:left;max-width:100%}\n    .about-grid{grid-template-columns:1fr;gap:40px}\n  }\n\n  /* -------- MOBILE <=768px -------- */\n  @media (max-width:768px){\n    .nav{padding:12px 18px}\n    .nav ul, .nav .lang{display:none}\n    .nav .brand{gap:10px}\n    .nav .brand img.b-icon{height:24px}\n    .nav .brand .divider{height:18px}\n    .nav .brand .wordmark{font-size:13px;letter-spacing:4px}\n    .nav .book{padding:9px 14px;font-size:10px;letter-spacing:.18em}\n    .nav .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:28px;height:28px;cursor:pointer;background:transparent;border:none}\n    .nav .hamburger span{display:block;width:22px;height:1px;background:var(--gold);margin:0 auto}\n\n    .hero{min-height:640px;height:auto;padding:140px 20px 80px}\n    .hero .crosshair{display:none}\n    .hero h1{font-size:52px;line-height:.95}\n    .hero .subline{font-size:15px;margin-top:18px}\n    .hero .eyebrow{font-size:9.5px;letter-spacing:.22em;margin-bottom:24px;gap:10px}\n    .hero .eyebrow .hair{width:22px}\n    .hero .meta{font-size:9px;gap:12px;margin-top:28px;letter-spacing:.18em}\n    .hero .actions{flex-direction:column;gap:12px;margin-top:36px;width:100%;max-width:320px;margin-left:auto;margin-right:auto}\n    .hero .actions .btn{width:100%;justify-content:center;min-height:48px;padding:14px 22px}\n    .hero .scroll-ind{display:none}\n\n    .ticker{padding:14px 0}\n    .ticker-track{font-size:20px;gap:36px}\n    .ticker-track span{gap:36px}\n\n    section.block{padding:80px 20px}\n    .section-head{margin-bottom:44px;padding-bottom:20px;gap:20px}\n    .section-head h2{font-size:42px}\n    .section-head .right{font-size:13px}\n\n    .cocktails{grid-template-columns:1fr}\n    .cocktail{min-height:auto;padding:24px 20px}\n    .cocktail .shot{height:150px}\n    .cocktail .base{top:20px;right:20px}\n\n    .packages{grid-template-columns:1fr;gap:18px}\n    .pkg{padding:30px 24px}\n    .pkg .tier .name{font-size:30px}\n    .pkg .price .amt{font-size:36px}\n    .pkg .pick{min-height:48px;padding:14px 0}\n\n    .addon-grid{grid-template-columns:1fr}\n    .addons{margin-top:44px;padding-top:28px}\n    .addons-head{flex-direction:column;align-items:flex-start;gap:10px}\n\n    .about{padding:70px 20px 70px}\n    .about-grid{grid-template-columns:1fr;gap:36px}\n    .about-copy h2{font-size:40px}\n    .about-copy p{font-size:14px}\n    .about-stat{padding:22px 24px}\n    .about-stat .n{font-size:48px}\n    .about-stat .l{font-size:9.5px;letter-spacing:.18em}\n\n    .strip{grid-template-columns:1fr 1fr}\n    .strip .cell{padding:28px 20px}\n    .strip .cell .n{font-size:40px}\n\n    .cta-block{padding:90px 20px}\n    .cta-block h2{font-size:48px}\n    .cta-block .sub{font-size:14px;margin-top:20px}\n    .cta-form{flex-direction:column;margin-top:36px}\n    .cta-form input{width:100%;padding:16px 18px}\n    .cta-form button{width:100%;min-height:48px;padding:16px 0}\n    .cta-contact{gap:28px;margin-top:36px;flex-direction:column;text-align:center}\n\n    footer{grid-template-columns:1fr;padding:44px 20px 28px;gap:32px}\n    .copyr{flex-direction:column;align-items:flex-start;gap:8px;font-size:9px}\n\n    .btn{min-height:48px}\n  }\n\n  /* -------- prefers-reduced-motion -------- */\n  @media (prefers-reduced-motion: reduce){\n    *, *::before, *::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}\n    .ticker-track{animation:none}\n    .hero .scroll-ind .mouse::after{animation:none;opacity:.6}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav class=\"nav\" id=\"nav\">\n  <a href=\"#\" class=\"brand\">\n    <img class=\"b-icon\" src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAXAAAAGpCAYAAACUKG3YAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABcKADAAQAAAABAAABqQAAAAB+aSndAABAAElEQVR4Aey9aZMdx3X3id73Dd3oBXtjB0gCxEKC4CIBlCVLsmw9nhhywi9sK2Ii5AhP2F9B0hfwC+uVIizvyzPizNh+xMf0I5MCQZEACQIEsTX2vbE0et/37vn9E5WXdbdeb3ff230qIm/VrcrKyjx5zj9PnjyZuWqVHUYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAkYBo4BRwChgFDAKGAWMAk  <option value=\"split\">Split mirror<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n<\u002Fdiv>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"emberCount\": 200,\n  \"emberDrift\": 0.9,\n  \"gold\": \"#c9a84c\",\n  \"bg\": \"#0D1117\",\n  \"heroStyle\": \"solid\"\n}/*EDITMODE-END*/;\n\n// NAV scrolled\nconst nav = document.getElementById('nav');\nwindow.addEventListener('scroll', () => {\n  nav.classList.toggle('scrolled', window.scrollY > 40);\n});\n\n// ---------- COCKTAILS DATA ----------\nconst cocktails = [\n  {n:'LANA\\u2019S KISS', base:'VODKA', ing:'vodka · cranberry · rose · lemon', sw:3, so:3, st:2},\n  {n:'M\\u00DAZA', base:'VODKA', ing:'vodka · pineapple · vanilla · lemon', sw:1, so:3, st:3},\n  {n:'GALAXY', base:'VODKA', ing:'vodka · peach · passion fruit · lychee', sw:2, so:2, st:2},\n  {n:'BLAZE', base:'WHISKEY', ing:'whiskey · cinnamon · apple · ginger beer', sw:3, so:2, st:2},\n  {n:'EMBER', base:'BOURBON', ing:'bourbon · vermouth · nut syrup · angostura', sw:1, so:4, st:4},\n  {n:'CLOUD', base:'GIN', ing:'gin · passion fruit · egg white · cinnamon', sw:3, so:2, st:3},\n  {n:'COCO EDEN', base:'GIN', ing:'gin · limoncello · elderflower · coconut', sw:2, so:2, st:3},\n  {n:'LA PRIMA NOTTE', base:'TEQUILA', ing:'tequila · agave · lychee · lemon', sw:2, so:3, st:2},\n  {n:'FUEGO', base:'MEZCAL', ing:'tequila · mezcal · passion fruit · simple syrup', sw:2, so:4, st:3},\n  {n:'DRIZZLE', base:'RUM', ing:'rum · cucumber · lychee · cranberry', sw:2, so:2, st:2},\n  {n:'TWISTED CANDY', base:'RUM', ing:'rum · cherry · raspberry · pineapple', sw:4, so:2, st:2},\n  {n:'BUBBLE TROUBLE', base:'PROSECCO', ing:'basil · peach · lemon · prosecco', sw:2, so:3, st:2}\n];\n\nconst glassIcon = `<svg width=\"62\" height=\"62\" viewBox=\"0 0 62 62\" fill=\"none\" stroke=\"#c9a84c\" stroke-width=\".6\" opacity=\".6\">\n  <path d=\"M14 14 L48 14 L31 38 Z\"/>\n  <path d=\"M31 38 L31 52\"/>\n  <path d=\"M20 52 L42 52\"/>\n  <circle cx=\"31\" cy=\"10\" r=\"1.5\" fill=\"#c9a84c\"/>\n<\u002Fsvg>`;\n\nfunction pips(val){\n  let s = '';\n  for (let i=0;i<5;i++) s += `<div class=\"pip${i<val?' on':''}\"><\u002Fdiv>`;\n  return s;\n}\n\nconst grid = document.getElementById('cocktails-grid');\ngrid.innerHTML = cocktails.slice(0, 6).map((c,i)=>`\n  <div class=\"cocktail\">\n    <div class=\"corner tl\"><\u002Fdiv><div class=\"corner tr\"><\u002Fdiv>\n    <div class=\"corner bl\"><\u002Fdiv><div class=\"corner br\"><\u002Fdiv>\n    <div class=\"base\">${c.base}<\u002Fdiv>\n    <div class=\"shot\" data-caption=\"plate ${String(i+1).padStart(2,'0')} / 4:5\">${glassIcon}<\u002Fdiv>\n    <div class=\"num\">№ ${String(i+1).padStart(2,'0')} / 20<\u002Fdiv>\n    <div class=\"name\">${c.n}<\u002Fdiv>\n    <div class=\"ingredients\">${c.ing}<\u002Fdiv>\n    <div class=\"stats\">\n      <div class=\"stat\"><span class=\"label\">Sweet<\u002Fspan><span class=\"pips\">${pips(c.sw)}<\u002Fspan><\u002Fdiv>\n      <div class=\"stat\"><span class=\"label\">Sour<\u002Fspan><span class=\"pips\">${pips(c.so)}<\u002Fspan><\u002Fdiv>\n      <div class=\"stat\"><span class=\"label\">Strong<\u002Fspan><span class=\"pips\">${pips(c.st)}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n`).join('');\n\n// ---------- TICKER ----------\nconst tickerItems = ['Signature Cocktails','Mobilní bar','Flavour Blaster','Ice Block','Svatby','Firemní akce','Soukromé párty','Masterclass','Fountain Show','Dry Ice Mist','Black · White · Oak Bar','Delivered in Black Tie','Praha & celá ČR','Since 2025'];\nconst tickerEl = document.getElementById('ticker');\nconst tickerLine = tickerItems.map(t=>`<span>${t}<span class=\"sep\"><\u002Fspan><\u002Fspan>`).join('');\ntickerEl.innerHTML = tickerLine + tickerLine;\n\n// ---------- EMBERS ----------\nconst canvas = document.getElementById('embers');\nconst ctx = canvas.getContext('2d');\nlet embers = [];\nlet emberCount = TWEAK_DEFAULTS.emberCount;\nlet emberDrift = TWEAK_DEFAULTS.emberDrift;\nconst _isMobile = () => window.matchMedia('(max-width: 768px)').matches;\nconst _reducedMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;\nconst _effectiveCount = () => _reducedMotion() ? 0 : (_isMobile() ? Math.min(emberCount, 30) : emberCount);\nconst _effectiveDrift = () => _reducedMotion() ? 0 : (_isMobile() ? Math.min(emberDrift, 0.5) : emberDrift);\n\nfunction sizeCanvas(){\n  canvas.width = canvas.offsetWidth * devicePixelRatio;\n  canvas.height = canvas.offsetHeight * devicePixelRatio;\n  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);\n}\nfunction rebuildEmbers(){\n  embers = [];\n  const n = _effectiveCount();\n  for (let i=0;i<n;i++){\n    embers.push(makeEmber(true));\n  }\n}\nfunction makeEmber(initial){\n  const w = canvas.offsetWidth, h = canvas.offsetHeight;\n  return {\n    x: Math.random()*w,\n    y: initial ? Math.random()*h : h + 10,\n    r: Math.random()*1.6 + 0.3,\n    vy: -(Math.random()*.5 + .15) * _effectiveDrift(),\n    vx: (Math.random()-.5) * .3 * _effectiveDrift(),\n    life: Math.random()*1 + .4,\n    maxLife: 1,\n    twinkle: Math.random()*Math.PI*2,\n    twinkleSpeed: .02 + Math.random()*.04\n  };\n}\nfunction tick(){\n  const w = canvas.offsetWidth, h = canvas.offsetHeight;\n  ctx.clearRect(0,0,w,h);\n  // faint central glow\n  const g = ctx.createRadialGradient(w/2,h*.55,0,w/2,h*.55,h*.8);\n  g.addColorStop(0,'rgba(201,168,76,.05)');\n  g.addColorStop(1,'rgba(201,168,76,0)');\n  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);\n\n  const goldHex = TWEAK_DEFAULTS.gold;\n  embers.forEach(p => {\n    p.x += p.vx; p.y += p.vy;\n    p.twinkle += p.twinkleSpeed;\n    p.life -= .002;\n    if (p.y < -10 || p.life <= 0){\n      Object.assign(p, makeEmber(false));\n    }\n    const alpha = Math.max(0, p.life) * (0.6 + 0.4*Math.sin(p.twinkle));\n    ctx.beginPath();\n    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);\n    ctx.fillStyle = hexA(goldHex, alpha);\n    ctx.shadowBlur = 6; ctx.shadowColor = goldHex;\n    ctx.fill();\n  });\n  ctx.shadowBlur = 0;\n  requestAnimationFrame(tick);\n}\nfunction hexA(hex,a){\n  const n = parseInt(hex.slice(1),16);\n  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;\n  return `rgba(${r},${g},${b},${a})`;\n}\nwindow.addEventListener('resize', () => { sizeCanvas(); rebuildEmbers(); });\nsizeCanvas(); rebuildEmbers(); tick();\n\n// ---------- TWEAKS ----------\nconst tweaksEl = document.getElementById('tweaks');\nfunction applyTweaks(){\n  document.documentElement.style.setProperty('--gold', TWEAK_DEFAULTS.gold);\n  document.documentElement.style.setProperty('--bg', TWEAK_DEFAULTS.bg);\n  emberCount = +TWEAK_DEFAULTS.emberCount;\n  emberDrift = +TWEAK_DEFAULTS.emberDrift;\n  rebuildEmbers();\n  // hero style\n  const h1 = document.querySelector('.hero h1');\n  const txt = `THE BAR<span class=\"dot\">.<\u002Fspan>`;\n  if (TWEAK_DEFAULTS.heroStyle === 'outline'){\n    h1.innerHTML = `<span class=\"outline\">THE BAR<span class=\"dot\" style=\"-webkit-text-stroke:0;color:var(--gold)\">.<\u002Fspan><\u002Fspan>`;\n  } else if (TWEAK_DEFAULTS.heroStyle === 'split'){\n    h1.innerHTML = `THE <span class=\"outline\">BAR<span class=\"dot\" style=\"-webkit-text-stroke:0;color:var(--gold)\">.<\u002Fspan><\u002Fspan>`;\n  } else {\n    h1.innerHTML = txt;\n  }\n}\nfunction bindTweaks(){\n  const bind = (id,key,coerce)=>{\n    const el = document.getElementById(id);\n    el.value = TWEAK_DEFAULTS[key];\n    el.addEventListener('input',()=>{\n      TWEAK_DEFAULTS[key] = coerce ? coerce(el.value) : el.value;\n      applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:TWEAK_DEFAULTS[key]}},'*');\n    });\n  };\n  bind('tw-count','emberCount',v=>+v);\n  bind('tw-drift','emberDrift',v=>+v);\n  bind('tw-gold','gold');\n  bind('tw-bg','bg');\n  bind('tw-style','heroStyle');\n}\nwindow.addEventListener('message',(e)=>{\n  const d = e.data||{};\n  if (d.type==='__activate_edit_mode') tweaksEl.classList.add('on');\n  if (d.type==='__deactivate_edit_mode') tweaksEl.classList.remove('on');\n});\nbindTweaks();\napplyTweaks();\nwindow.parent.postMessage({type:'__edit_mode_available'},'*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
